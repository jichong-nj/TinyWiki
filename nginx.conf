server {
    listen 80;
    server_name localhost;

    # 前端
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 静态文件（同步修正，避免后续问题）
    location /static/ {
        alias /app/knowledge_base/staticfiles/;  # 对应docker-compose中的static_volume挂载路径
    }

    # 媒体文件（同步修正）
    location /media/ {
        alias /app/knowledge_base/media/;  # 对应docker-compose中的media_volume挂载路径
    }

    # 存储文件 - 核心修正：alias指向实际挂载路径
    location /storage/ {
        alias /app/knowledge_base/storage/;  # 对应docker-compose中的storage_volume挂载路径
        autoindex on;  # 可选：关闭目录浏览，增强安全
        expires 30d;    # 可选：设置缓存，提升性能
    }
    # API 代理到后端8080端口
    location /api/ {
        proxy_pass http://web:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传大小限制
    client_max_body_size 100M;
}
