name: tinywiki

services:
  db:
    build: ./postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${DATA_DIR}/postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  web:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             chmod -R 755 /app/knowledge_base/staticfiles/ &&
             chmod -R 755 /app/knowledge_base/storage/ &&
             chmod -R 755 /app/knowledge_base/media/ &&
             gunicorn knowledge_base.wsgi:application --bind 0.0.0.0:8080 --workers 4 --timeout 120"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ${DATA_DIR}/staticfiles:/app/knowledge_base/staticfiles
      - ${DATA_DIR}/media:/app/knowledge_base/media
      - ${DATA_DIR}/storage:/app/knowledge_base/storage
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-this-is-a-simple-secret-key-change-it-in-production"
      ALLOWED_HOSTS: "*"
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOW_ALL: "True"
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # Mount data directories to specific paths for static resources
      - ${DATA_DIR}/storage:/app/knowledge_base/storage
      - ${DATA_DIR}/staticfiles:/app/knowledge_base/staticfiles
      - ${DATA_DIR}/media:/app/knowledge_base/media
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - web
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge


