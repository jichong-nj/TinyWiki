services:
  db:
    # 使用自定义镜像（pgvector + zhparser 中文分词）
    build: ./postgres
    environment:
      POSTGRES_DB: tinywiki
      POSTGRES_USER: tinywiki_user
      POSTGRES_PASSWORD: tinywiki_password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinywiki_user -d tinywiki"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn knowledge_base.wsgi:application --bind 0.0.0.0:8080 --workers 4 --timeout 120"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - static_volume:/app/knowledge_base/staticfiles
      - media_volume:/app/knowledge_base/media
      - storage_volume:/app/knowledge_base/storage
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-this-is-a-simple-secret-key-change-it-in-production"
      ALLOWED_HOSTS: "*"
      POSTGRES_DB: tinywiki
      POSTGRES_USER: tinywiki_user
      POSTGRES_PASSWORD: tinywiki_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOW_ALL: "True"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/knowledge_base/staticfiles
      - media_volume:/app/knowledge_base/media
      - storage_volume:/app/knowledge_base/storage
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - web
    restart: always

volumes:
  # postgres_data:  # 现在使用本地挂载，不需要这个volume了
  static_volume:
  media_volume:
  storage_volume:
